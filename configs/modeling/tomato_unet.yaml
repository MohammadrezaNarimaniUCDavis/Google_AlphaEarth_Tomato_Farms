# Pixelwise tomato vs non-tomato training (AlphaEarth embedding GeoTIFF chips).
# Paths are repo-relative unless you pass absolute paths from SageMaker.

data:
  chips_index_csv: "data/splits/chips_index.csv"
  # Resize all chips to this H×W (embeddings vary in spatial size).
  target_hw: [128, 128]

model:
  in_channels: 64
  # If true, open first chip and set in_channels from band count (overrides in_channels).
  infer_in_channels: true
  base_channels: 32
  dropout_p: 0.1

training:
  epochs: 30
  # T4 16GB + AMP: 24 is a good default; if OOM: ALPHA_EARTH_TRAIN_BATCH_SIZE=16
  batch_size: 24
  # FP16 forward + GradScaler backward — large speedup on T4; disable with use_amp: false
  use_amp: true
  # Progress bars + per-batch loss in terminal (set false for log-only CI)
  tqdm: true
  # Match PyTorch “suggested max” on many Studio shapes; raise to 6–8 if RAM allows
  num_workers: 4
  # Val + test DataLoaders only (train-split eval uses train num_workers). Use 0 for S3 /vsis3/ reliability.
  eval_num_workers: 0
  # When train chips open via /vsis3/, cap train num_workers (OOM otherwise). Env overrides: ALPHA_EARTH_S3_TRAIN_WORKERS_CAP
  s3_train_num_workers_cap: 2
  prefetch_factor: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  bce_weight: 0.5
  dice_weight: 0.5
  use_pos_weight: true

output:
  experiments_dir: "outputs/experiments"
  # run_id: null  # omit for UTC timestamp folder name
