# Copy this file to configs/paths.local.yaml (gitignored) and adjust paths.
# Per-survey-year snippets: configs/landiq/years/*.example.yaml

project_root: "."  # or absolute path to repo root

data:
  raw_landiQ: "data/raw/landiq"
  derived_tomato: "data/derived/landiq_tomato"
  derived_non_tomato: "data/derived/landiq_non_tomato"
  alpha_earth_clips: "data/derived/alpha_earth_clips"
  splits: "data/splits"

landiq:
  # Optional explicit vector path (repo-relative). If set, skips glob under data/raw/landiq/…
  # e.g. after unzip to data/derived/landiq_extracted/<year>/…
  input_shapefile: null
  # Set after exploring shapefiles (notebooks/landiq/years/…)
  shapefile_glob: "*.shp"
  # If set, only search under data/raw/landiq/<year>/ (e.g. 2024). Omit to search all years.
  year: null
  # Use recursive search (needed after unzipping into subfolders)
  shapefile_recursive: true
  # Single column (used if crop_columns is not set):
  crop_column: null  # e.g. "CROPTYP2"
  # OR across multiple slots (Land IQ: CROPTYP1–3); catches T15/T26 in any slot:
  crop_columns: null  # e.g. ["CROPTYP1", "CROPTYP2", "CROPTYP3"]
  tomato_values: []  # e.g. ["T15", "T26"] for DWR legend
  # Output GPKG filename inside data/derived/landiq_tomato/ (optional).
  # If null and year is set, default is landiq_tomato_<year>.gpkg; else landiq_tomato.gpkg
  output_filename: null  # e.g. "landiq_tomato_2018.gpkg"
  # Output GPKG filename inside data/derived/landiq_non_tomato/ (optional).
  # If null and year is set, default is landiq_non_tomato_<year>.gpkg; else landiq_non_tomato.gpkg
  output_non_tomato_filename: null  # e.g. "landiq_non_tomato_2018.gpkg"
  # For explore notebook: optional explicit zip name inside raw/landiq/<year>/
  zip_filename: null  # e.g. "i15_crop_mapping_2018_shp.zip"

alpha_earth:
  years: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  # Local GeoTIFF / COG stack root: put one file (or nested .tif) under <root>/<year>/ e.g. alpha_earth_rasters/2018/embeddings.tif
  local_raster_root: "data/derived/alpha_earth_rasters"
  # crs: "EPSG:4326"  # set to match your raster stack
  # Earth Engine: GOOGLE/SATELLITE_EMBEDDING/V1/ANNUAL (AlphaEarth) — see notebooks/alpha_earth/earth_engine/
  gee:
    # Cloud project ID or number for ee.Initialize (optional if present in credentials JSON or EE_PROJECT)
    project: null
    embedding_collection: "GOOGLE/SATELLITE_EMBEDDING/V1/ANNUAL"
    # Calendar year of embedding composite (2017–2024 in catalog). Align with landiq.year when possible (e.g. both 2018).
    embedding_year: 2018
    scale_m: 10
    export_crs: "EPSG:4326"
    # Parallel getDownloadURL + HTTP downloads (threads). Lower if Earth Engine throttles.
    download_workers: 8
    # Unused by the EE notebook (mask runs inside each download thread). Kept for future tooling.
    mask_workers: null
    # null = export every tomato polygon in the GPKG; integer = first N only (omit key defaults to 5 in the EE notebook)
    pilot_polygon_count: null

figures_dir: "figures"

# -----------------------------------------------------------------------------
# Amazon S3 — mirror of data/ for SageMaker / multi-machine workflows
# Bucket is created by infra/sagemaker-notebook.yaml (pattern below) or use your own.
# Layout is documented in data/s3/README.md
# -----------------------------------------------------------------------------
s3:
  # e.g. tomato-alphaearth-054037103012-data — replace ACCOUNT_ID with yours
  bucket: "tomato-alphaearth-YOUR_ACCOUNT_ID-data"
  region: "us-west-2"
  # All project objects live under this prefix inside the bucket (no leading/trailing /)
  project_root_prefix: "google-alphaearth-tomato-farms"
  # Logical categories → path under project_root_prefix (mirror local data/ where possible)
  keys:
    raw_landiq: "raw/landiq"
    derived_tomato: "derived/landiq_tomato"
    derived_non_tomato: "derived/landiq_non_tomato"
    alpha_earth_clips: "derived/alpha_earth_clips"
    manifests: "manifests"
    models: "models"
    splits: "splits"
