# Example SageMaker job settings (no secrets). Copy and adapt locally if needed.

role_arn: "arn:aws:iam::YOUR_ACCOUNT_ID:role/YOUR_SAGEMAKER_ROLE"
region: "us-west-2"

training:
  instance_type: "ml.g4dn.xlarge"
  instance_count: 1
  volume_size_gb: 50
  max_run_seconds: 86400

channels:
  train: "s3://your-bucket/prefix/train"
  validation: "s3://your-bucket/prefix/val"

hyperparameters:
  epochs: 50
  batch_size: 16
  learning_rate: 0.001

output_path: "s3://your-bucket/prefix/model-artifacts"
